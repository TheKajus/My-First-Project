<!DOCTYPE html>

<head>

    <title>Home</title>
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="box-left">

                <p>Free Delivery</p>
                <div class="line"></div>

            </div>
            <div class="box-right">

                    <img src="../image/twitter.png" alt="Twitter logo" width="14" height="12" />

                <form class="form">

            <div class="main-end">

        <div class="nav-head">

                <ul class="nav-list">

                    <li><a href="../page/contractUs.html">CONTACT US</a></li>
                </ul>

            <div class="img-text">
